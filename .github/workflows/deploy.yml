name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pyxel
        run: pip install pyxel

      - name: Build and convert games to HTML
        run: |
          mkdir -p build
          for dir in apps/*/; do
            name=$(basename "$dir")
            pyxel package "$dir" "$dir/main.py"
            pyxel app2html "${name}.pyxapp"
            mv "${name}.html" "build/${name}.html"
            mv "${name}.pyxapp" "build/${name}.pyxapp"
          done

      - name: Generate index.html
        run: python scripts/generate_index.py build/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
